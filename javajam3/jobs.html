    <body> 
        <div class="container"> 
        <header>
            <h1>JavaJam Coffee House</h1>
        </header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#"><img src="javajamlogo.jpg" alt="JavaJam logo" width="40" height="30" class="d-inline-block align-text-top"> Javajam Coffee House

<main class="p-4">
    <h2 class="display-6 fw-bold mb-4">Jobs At JavaJam</h2>
    <p class="lead">Want to work at JavaJam? Fill out the form below to start your application. Required fields are marked with an asterisk (*).</p>
    
    <div class="card shadow-sm mt-4">
        <div class="card-body p-4">
            <form method="post" action="/action_page.js">
                
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Name*</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email*</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                
                <div class="mb-3">
                    <label for="experience" class="form-label fw-bold">Experience</label>
                    <textarea class="form-control" id="experience" name="experience" rows="4"></textarea>
                </div>
                
                <div class="mb-3">
                    <label for="position" class="form-label fw-bold">Select job position</label>
                    <select class="form-select" id="position" name="position">
                        <option value="barista">Barista</option>
                        <option value="cashier">Cashier</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="interview_date" class="form-label fw-bold">Preferred Interview Date & Time</label>
                    <input type="datetime-local" class="form-control" id="interview_date" name="interview_date">
                </div>
                
                <div class="mb-4">
                    <label for="photo" class="form-label fw-bold">Upload your photo</label>
                    <input class="form-control" type="file" id="photo" name="photo">
                </div>
                
                <button type="submit" class="btn btn-dark btn-lg w-100">Apply Now</button>
                
            </form>
        </div>
    </div>
</main>            <footer class="text-center fst-italic">
                    Copyright &copy; 2025 JavaJam Coffee House<br>
                    <a href="mailto:amri@kamaruzaman.com">amri@kamaruzaman.com</a>
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body> 
</html>
